kind = "web"
previewPath = "/"
title = "Bei Yangu — Compare Hospital Prices in Kenya"
version = "1.0.0"
id = "artifacts/bei-yangu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20128

[services.development]
run = "pnpm --filter @workspace/bei-yangu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bei-yangu", "run", "build" ]
publicDir = "artifacts/bei-yangu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20128"
BASE_PATH = "/"
